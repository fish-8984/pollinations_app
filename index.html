<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollinations AI 创作工坊</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
  }
  header {
    text-align: center;
    padding: 40px 20px 20px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-bottom: 1px solid #333;
  }
  header h1 {
    font-size: 28px;
    color: #7c3aed;
    letter-spacing: 2px;
  }
  header p {
    color: #888;
    margin-top: 8px;
    font-size: 14px;
  }
  .tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    margin: 20px auto;
    max-width: 400px;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #888;
    font-size: 15px;
    transition: all 0.2s;
  }
  .tab:first-child { border-radius: 8px 0 0 8px; }
  .tab:last-child { border-radius: 0 8px 8px 0; }
  .tab.active {
    background: #7c3aed;
    color: #fff;
    border-color: #7c3aed;
  }
  .panel {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
    display: none;
  }
  .panel.active { display: block; }
  .input-group {
    margin-bottom: 16px;
  }
  .input-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: #888;
  }
  .input-group input, .input-group textarea {
    width: 100%;
    padding: 12px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
  }
  .input-group input:focus, .input-group textarea:focus {
    border-color: #7c3aed;
  }
  .input-group textarea { resize: vertical; min-height: 80px; }
  .btn {
    padding: 12px 24px;
    background: #7c3aed;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    transition: background 0.2s;
  }
  .btn:hover { background: #6d28d9; }
  .btn:disabled { background: #444; cursor: not-allowed; }
  .result-area {
    margin-top: 20px;
    text-align: center;
  }
  .result-area img {
    max-width: 100%;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
  }
  .loading {
    color: #7c3aed;
    font-size: 14px;
    margin-top: 12px;
  }
  /* Chat styles */
  .chat-box {
    background: #111;
    border: 1px solid #333;
    border-radius: 12px;
    height: 400px;
    overflow-y: auto;
    padding: 16px;
    margin-bottom: 16px;
  }
  .msg {
    margin-bottom: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    max-width: 85%;
    font-size: 14px;
    line-height: 1.6;
  }
  .msg.user {
    background: #7c3aed;
    color: #fff;
    margin-left: auto;
    text-align: right;
  }
  .msg.ai {
    background: #222;
    color: #e0e0e0;
    border: 1px solid #333;
  }
  /* Markdown 渲染样式 */
  .msg.ai h1, .msg.ai h2, .msg.ai h3 {
    margin: 8px 0 4px 0;
    color: #a78bfa;
  }
  .msg.ai h1 { font-size: 18px; }
  .msg.ai h2 { font-size: 16px; }
  .msg.ai h3 { font-size: 15px; }
  .msg.ai p { margin: 6px 0; }
  .msg.ai code {
    background: #333;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Consolas', monospace;
    font-size: 13px;
  }
  .msg.ai pre {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .msg.ai pre code {
    background: none;
    padding: 0;
  }
  .msg.ai ul, .msg.ai ol {
    margin: 6px 0;
    padding-left: 20px;
  }
  .msg.ai li { margin: 4px 0; }
  .msg.ai blockquote {
    border-left: 3px solid #7c3aed;
    padding-left: 10px;
    margin: 8px 0;
    color: #aaa;
  }
  .msg.ai a { color: #a78bfa; }
  .msg.ai table {
    border-collapse: collapse;
    margin: 8px 0;
    width: 100%;
  }
  .msg.ai th, .msg.ai td {
    border: 1px solid #444;
    padding: 6px 10px;
    text-align: left;
  }
  .msg.ai th { background: #333; }
  .chat-input-row {
    display: flex;
    gap: 10px;
  }
  .chat-input-row input {
    flex: 1;
  }
  footer {
    text-align: center;
    padding: 30px;
    color: #555;
    font-size: 12px;
  }
  footer a { color: #7c3aed; }
</style>
</head>
<body>

<header>
  <h1>Pollinations AI 创作工坊</h1>
  <p>Powered by <a href="https://pollinations.ai" style="color:#7c3aed">pollinations.ai</a> — Free & Open AI</p>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('image')">[图片生成]</div>
  <div class="tab" onclick="switchTab('chat')">[AI 聊天]</div>
</div>

<!-- 图片生成面板 -->
<div class="panel active" id="panel-image">
  <div class="input-group">
    <label>描述你想要的图片（英文效果更好）</label>
    <textarea id="imgPrompt" placeholder="A cyberpunk city at sunset, neon lights reflecting on wet streets..."></textarea>
  </div>
  <div class="input-group">
    <label>尺寸</label>
    <input type="text" id="imgSize" value="1024" placeholder="1024">
  </div>
  <button class="btn" id="imgBtn" onclick="generateImage()">生成图片</button>
  <div class="result-area" id="imgResult"></div>
</div>

<!-- 聊天面板 -->
<div class="panel" id="panel-chat">
  <div class="chat-box" id="chatBox"></div>
  <div class="chat-input-row">
    <input type="text" id="chatInput" placeholder="说点什么..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="btn" onclick="sendChat()">发送</button>
  </div>
</div>

<footer>
  Built with pollinations.ai API — Seed Tier Application
</footer>

<script>
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if (name === 'image') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('panel-image').classList.add('active');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('panel-chat').classList.add('active');
  }
}

function generateImage() {
  const prompt = document.getElementById('imgPrompt').value.trim();
  const size = document.getElementById('imgSize').value.trim() || '1024';
  const btn = document.getElementById('imgBtn');
  const result = document.getElementById('imgResult');

  if (!prompt) { alert('请输入描述'); return; }

  btn.disabled = true;
  btn.textContent = '生成中...';
  result.innerHTML = '<div class="loading">正在生成，通常需要 10-20 秒...</div>';

  const seed = Math.floor(Math.random() * 999999);
  const url = 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) + '?width=' + size + '&height=' + size + '&seed=' + seed + '&nologo=true';

  const img = new Image();
  img.onload = function() {
    result.innerHTML = '';
    result.appendChild(img);
    btn.disabled = false;
    btn.textContent = '生成图片';
  };
  img.onerror = function() {
    result.innerHTML = '<div class="loading">生成失败，请重试</div>';
    btn.disabled = false;
    btn.textContent = '生成图片';
  };
  img.src = url;
}

// Chat
const chatHistory = [];

async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  chatHistory.push({ role: 'user', content: text });
  appendMsg('user', text);

  const box = document.getElementById('chatBox');
  const loadingDiv = appendMsg('ai', '思考中...');

  try {
    const res = await fetch('https://text.pollinations.ai/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: chatHistory,
        model: 'openai',
        seed: Math.floor(Math.random() * 999999)
      })
    });
    const reply = await res.text();
    chatHistory.push({ role: 'assistant', content: reply });
    loadingDiv.innerHTML = marked.parse(reply);
  } catch (e) {
    loadingDiv.textContent = '请求失败，请重试';
  }
  box.scrollTop = box.scrollHeight;
}

function appendMsg(role, text) {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}
</script>
</body>
</html>
